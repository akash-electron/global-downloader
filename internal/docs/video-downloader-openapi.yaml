openapi: 3.0.3
info:
  title: Global Video Downloader API
  description: A high-performance asynchronous API for downloading videos and extracting audio using yt-dlp and ffmpeg.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API.
      operationId: getHealth
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: global-downloader

  /download:
    post:
      summary: Enqueue a download job
      description: Submit a URL to be downloaded asynchronously. Supports format selection and audio extraction.`
      operationId: createDownloadJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '202':
          description: Job successfully enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /job/{id}:
    get:
      summary: Get job status
      description: Retrieve the real-time status and progress of a specific download job.
      operationId: getJob
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the job
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs:
    get:
      summary: List all jobs
      description: Retrieve a snapshot of all tracked jobs currently in the system memory queue.
      operationId: listJobs
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  count:
                    type: integer
                    example: 5

  /file/{filename}:
    get:
      summary: Download a completed file
      description: Stream a finished download file to the client.
      operationId: getFile
      parameters:
        - name: filename
          in: path
          required: true
          description: The basename of the completed file
          schema:
            type: string
      responses:
        '200':
          description: The binary file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
            audio/mpeg:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /files:
    get:
      summary: List available files
      description: List all generated files currently stored on the server.
      operationId: listFiles
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileInfo'
                  count:
                    type: integer
                    example: 3

components:
  schemas:
    DownloadRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The URL of the video or audio to download.
          example: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
        format:
          type: string
          enum: [mp4, mkv, webm, mp3, m4a, wav, ogg, best]
          default: mp4
          description: The desired output format.
        quality:
          type: string
          enum: [best, 1080p, 720p, 480p, 360p, audio]
          default: best
          description: The preferred video/audio quality.
        audio_only:
          type: boolean
          default: false
          description: Set to true to extract only the audio stream.

    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        url:
          type: string
          format: uri
        format:
          type: string
        quality:
          type: string
        audio_only:
          type: boolean
        status:
          type: string
          enum: [pending, processing, completed, failed]
          example: processing
        progress:
          type: number
          format: float
          description: Download progress percentage (0-100)
          example: 45.5
        title:
          type: string
          description: The resolved title of the media.
          example: "Never Gonna Give You Up"
        file_path:
          type: string
          description: Absolute path of the file on disk (only populated when status is completed).
        file_size:
          type: integer
          description: Size of the downloaded file in bytes.
          example: 10485760
        error:
          type: string
          description: Error message if the job failed.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    JobResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/Job'
        message:
          type: string
          example: "job enqueued"

    FileInfo:
      type: object
      properties:
        name:
          type: string
          example: "Never Gonna Give You Up.mp4"
        path:
          type: string
          description: The local absolute path of the file.
        size_bytes:
          type: integer
          example: 10485760
        created_at:
          type: string
          format: date-time
        mime_type:
          type: string
          example: "video/mp4"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "job not found"
        code:
          type: integer
          example: 404
